<!DOCTYPE html>
<html lang="es">
<head>
   <link rel="manifest" href="manifest.json">
   <meta name="theme-color" content="#007AFF">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HabitFlow Elite</title>
    <style>
        :root {
            --primary: #007AFF; /* iOS Blue */
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text-main: #000000;
            --text-muted: #8E8E93;
            --radius-ios: 20px;
            --bezier: cubic-bezier(0.32, 0.72, 0, 1);
        }
         @font-face {
            font-family: 'sf';
            src: url('../SF-Pro.ttf') format('truetype');
         }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: -apple-system, 'sf'; 
            margin: 0; background: var(--bg); color: var(--text-main);
            padding-bottom: 100px;
        }

        /* --- Header --- */
        header { padding: 40px 20px 10px; }
        header h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        #dateSelector { padding: 0 20px 20px; }
        #dateSelector input { 
            width: 100%; border: none; background: #E3E3E8; padding: 12px;
            border-radius: 12px; font-weight: 600; font-size: 16px;
        }

        /* --- List --- */
        main { padding: 0 20px; }
        .habitCard { 
            background: var(--card); padding: 16px; border-radius: 18px;
            display: flex; align-items: center; gap: 14px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .habitIconCircle { 
            width: 44px; height: 44px; background: #F2F2F7; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .habitInfo { flex: 1; }
        .habitInfo h3 { margin: 0; font-size: 17px; font-weight: 600; }
        .habitInfo p { margin: 2px 0 0; font-size: 13px; color: var(--text-muted); }
        .habitProgressBadge { font-size: 14px; font-weight: 700; color: var(--primary); }

        /* --- Action Button --- */
        #addHabitBtn { 
            position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px;
            border-radius: 30px; background: var(--primary); color: white; border: none;
            font-size: 30px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); z-index: 90;
        }

        /* --- Sheets (iOS Style) --- */
        .sheet { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            display: none; align-items: flex-end; z-index: 1000;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .sheet.active { display: flex; opacity: 1; }
        
        .sheetContent { 
            background: var(--card); width: 100%; padding: 25px 20px 40px;
            border-radius: 30px 30px 0 0; max-height: 92vh; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.4s var(--bezier);
        }
        .sheet.active .sheetContent { transform: translateY(0); }

        /* --- Forms --- */
        .formGroup { margin-bottom: 20px; }
        .formGroup label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; margin-left: 5px; }
        input[type="text"], input[type="number"], input[type="time"] { 
            width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 14px; font-size: 16px; background: #FAFAFA;
        }
        .unitInputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Icon Picker Circle */
        .iconTrigger { width: 70px; height: 70px; border-radius: 50%; background: #F2F2F7; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 2px dashed var(--primary); }

        .iconGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 10px; }
        .iconItem { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 28px; border-radius: 12px; background: #F2F2F7; }

        /* --- View Sheet --- */
        .manualQtyInput { 
            font-size: 48px; font-weight: 800; border: none; text-align: center; width: 150px; margin: 10px auto; display: block; background: transparent; color: var(--primary);
        }

        /* --- Calendar Pro --- */
        .calGrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .dayCell { position: relative; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
        .progress-ring { 
            position: absolute; width: 38px; height: 38px; border-radius: 50%;
            background: conic-gradient(var(--primary) calc(var(--p) * 1%), #E5E5EA 0);
            display: flex; align-items: center; justify-content: center;
        }
        .progress-ring::after { content: ""; position: absolute; width: 32px; height: 32px; background: white; border-radius: 50%; }
        .dayCell.full .progress-ring { background: #34C759; }
        .dayCell.full .progress-ring::after { display: none; }
        .dayCell.full { color: white; }
        .dayNum { z-index: 2; position: relative; }

        /* Buttons */
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; font-size: 17px; margin-top: 10px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #E5E5EA; color: var(--text-main); }
        .btn-red { color: #FF3B30; background: #FFE9E8; }
    </style>
</head>
<body>

<header><h1>Hábitos</h1></header>
<div id="dateSelector"><input type="date" id="selectedDate"></div>
<main id="habitsContainer"></main>
<button id="addHabitBtn">＋</button>

<div class="sheet" id="createSheet">
    <div class="sheetContent">
        <div class="iconTrigger" id="iconPickerTrigger">✨</div>
        <div class="formGroup">
            <label>Nombre</label>
            <input type="text" id="hName" placeholder="Ej. Beber agua">
        </div>
        <div class="unitInputs">
            <div class="formGroup"><label>Unidad (Singular)</label><input type="text" id="uSing" placeholder="Vaso"></div>
            <div class="formGroup"><label>Unidad (Plural)</label><input type="text" id="uPlur" placeholder="Vasos"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="formGroup"><label>Meta Diaria</label><input type="number" id="hGoal" value="1"></div>
            <div class="formGroup"><label>Incremento</label><input type="number" id="hStep" value="1"></div>
        </div>
        <div class="formGroup" style="display:flex; align-items:center; gap:10px; background: #F2F2F7; padding:15px; border-radius:14px;">
            <input type="checkbox" id="hTimeToggle"> <label style="margin:0">Recordatorio con hora</label>
            <input type="time" id="hTime" style="width:120px; padding:5px; margin-left:auto; display:none;">
        </div>
        <button class="btn btn-blue" onclick="saveHabit()">Guardar</button>
    </div>
</div>

<div class="sheet" id="viewSheet">
    <div class="sheetContent" style="text-align: center;">
        <div id="vIcon" style="font-size: 50px; margin-bottom: 10px;"></div>
        <h2 id="vName" style="margin:0; font-size: 24px;"></h2>
        <p id="vUnitLabel" style="color: var(--text-muted); margin-bottom: 20px;"></p>
        
        <div style="display:flex; align-items:center; justify-content:center; gap:20px;">
            <button class="btn btn-gray" style="width:60px; height:60px; border-radius:30px; font-size:24px;" onclick="updateQty(-1)">-</button>
            <input type="number" id="vQtyManual" class="manualQtyInput">
            <button class="btn btn-gray" style="width:60px; height:60px; border-radius:30px; font-size:24px;" onclick="updateQty(1)">+</button>
        </div>

        <button class="btn btn-blue" onclick="openStreak()">Historial de Racha</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn btn-gray" onclick="editHabit()">Editar</button>
            <button class="btn btn-red" onclick="deleteHabit()">Eliminar</button>
        </div>
    </div>
</div>

<div class="sheet" id="iconPickerSheet">
    <div class="sheetContent">
        <h3 style="text-align:center">Elige un icono</h3>
        <div class="iconGrid" id="iconGrid"></div>
        <button class="btn btn-gray" onclick="closeSheet('iconPickerSheet')">Cancelar</button>
    </div>
</div>

<div class="sheet" id="streakSheet">
    <div class="sheetContent">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button class="btn btn-gray" style="width:40px; margin:0" onclick="changeMonth(-1)">❮</button>
            <h3 id="calTitle" style="margin:0"></h3>
            <button class="btn btn-gray" style="width:40px; margin:0" onclick="changeMonth(1)">❯</button>
        </div>
        <div class="calGrid" id="calGrid"></div>
        <button class="btn btn-gray" style="margin-top:20px" onclick="closeSheet('streakSheet')">Cerrar</button>
    </div>
</div>

<script>
let habits = JSON.parse(localStorage.getItem('habits') || '[]');
let currentHabitIdx = null;
let calDate = new Date();

// --- Default Date (2026 Ready) ---
const dateInput = document.getElementById('selectedDate');
const now = new Date();
dateInput.value = now.toISOString().split('T')[0];
let selectedDate = dateInput.value;

// --- Iconos ---
const emojiList = ['􀙪','􀠒','􀉛','􀤟','􁂙','􁌋','􀻑','􀟞','􀐙','􀈊','􀟛','􁚮','􁖏','􁓃','􁐡','􀝢','􀩼','􀇁','􀐮','􁔴','􀦉','􀆮'];
let selectedIcon = '✨';

function initIcons() {
    const grid = document.getElementById('iconGrid');
    emojiList.forEach(emoji => {
        const div = document.createElement('div');
        div.className = 'iconItem'; div.textContent = emoji;
        div.onclick = () => {
            selectedIcon = emoji;
            document.getElementById('iconPickerTrigger').textContent = emoji;
            closeSheet('iconPickerSheet');
        };
        grid.appendChild(div);
    });
}

// --- Sheets Core ---
function openSheet(id) { 
    const el = document.getElementById(id);
    el.style.display = 'flex';
    setTimeout(() => el.classList.add('active'), 10);
}

function closeSheet(id) {
    const el = document.getElementById(id);
    el.classList.remove('active');
    setTimeout(() => el.style.display = 'none', 400);
}

// Cerrar al picar fuera
document.querySelectorAll('.sheet').forEach(sheet => {
    sheet.addEventListener('click', (e) => {
        if(e.target === sheet) closeSheet(sheet.id);
    });
});

// --- Logic ---
function renderHabits() {
    const container = document.getElementById('habitsContainer');
    container.innerHTML = '';
    habits.forEach((h, i) => {
        const qty = h.history[selectedDate] || 0;
        const unit = qty === 1 ? h.uSing : h.uPlur;
        const card = document.createElement('div');
        card.className = 'habitCard';
        card.onclick = () => openView(i);
        card.innerHTML = `
            <div class="habitIconCircle">${h.icon}</div>
            <div class="habitInfo">
                <h3>${h.name}</h3>
                <p>${h.time ? '⏰ '+h.time : 'Hoy'}</p>
            </div>
            <div class="habitProgressBadge">${qty} / ${h.goal} ${unit}</div>
        `;
        container.appendChild(card);
    });
}

function saveHabit() {
    const h = {
        name: document.getElementById('hName').value,
        uSing: document.getElementById('uSing').value || 'vez',
        uPlur: document.getElementById('uPlur').value || 'veces',
        goal: parseInt(document.getElementById('hGoal').value) || 1,
        step: parseInt(document.getElementById('hStep').value) || 1,
        icon: selectedIcon,
        time: document.getElementById('hTimeToggle').checked ? document.getElementById('hTime').value : null,
        history: currentHabitIdx !== null ? habits[currentHabitIdx].history : {}
    };
    if(!h.name) return;
    if(currentHabitIdx !== null) habits[currentHabitIdx] = h;
    else habits.push(h);
    
    localStorage.setItem('habits', JSON.stringify(habits));
    renderHabits();
    closeSheet('createSheet');
}

function openView(i) {
    currentHabitIdx = i;
    const h = habits[i];
    document.getElementById('vName').textContent = h.name;
    document.getElementById('vIcon').textContent = h.icon;
    document.getElementById('vQtyManual').value = h.history[selectedDate] || 0;
    document.getElementById('vUnitLabel').textContent = `Meta: ${h.goal} ${h.uPlur}`;
    openSheet('viewSheet');
}

// Cambio manual de cantidad
document.getElementById('vQtyManual').onchange = (e) => {
    const h = habits[currentHabitIdx];
    h.history[selectedDate] = parseInt(e.target.value) || 0;
    localStorage.setItem('habits', JSON.stringify(habits));
    renderHabits();
};

function updateQty(dir) {
    const h = habits[currentHabitIdx];
    const current = h.history[selectedDate] || 0;
    const newVal = Math.max(0, current + (dir * h.step));
    h.history[selectedDate] = newVal;
    document.getElementById('vQtyManual').value = newVal;
    localStorage.setItem('habits', JSON.stringify(habits));
    renderHabits();
}

function openStreak() {
    calDate = new Date();
    renderCalendar();
    openSheet('streakSheet');
}

function renderCalendar() {
    const h = habits[currentHabitIdx];
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const month = calDate.getMonth();
    const year = calDate.getFullYear();
    document.getElementById('calTitle').textContent = new Intl.DateTimeFormat('es-ES', {month:'long', year:'numeric'}).format(calDate);

    ['D','L','M','M','J','V','S'].forEach(d => {
        const div = document.createElement('div'); div.style.fontSize='12px'; div.style.color='#8E8E93'; div.textContent=d; grid.appendChild(div);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

    for(let d=1; d<=daysInMonth; d++) {
        const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const qty = h.history[key] || 0;
        const p = Math.min(100, (qty / h.goal) * 100);
        
        const cell = document.createElement('div');
        cell.className = 'dayCell' + (p >= 100 ? ' full' : '');
        cell.innerHTML = qty > 0 ? `<div class="progress-ring" style="--p:${p}"></div><span class="dayNum">${d}</span>` : `<span class="dayNum">${d}</span>`;
        grid.appendChild(cell);
    }
}

function changeMonth(dir) { calDate.setMonth(calDate.getMonth()+dir); renderCalendar(); }

function editHabit() {
    const h = habits[currentHabitIdx];
    document.getElementById('hName').value = h.name;
    document.getElementById('uSing').value = h.uSing;
    document.getElementById('uPlur').value = h.uPlur;
    document.getElementById('hGoal').value = h.goal;
    document.getElementById('hStep').value = h.step;
    document.getElementById('hTimeToggle').checked = !!h.time;
    document.getElementById('hTime').value = h.time || "";
    document.getElementById('hTime').style.display = h.time ? 'block' : 'none';
    selectedIcon = h.icon;
    document.getElementById('iconPickerTrigger').textContent = h.icon;
    closeSheet('viewSheet');
    openSheet('createSheet');
}

function deleteHabit() {
    if(confirm('¿Borrar hábito?')) {
        habits.splice(currentHabitIdx, 1);
        localStorage.setItem('habits', JSON.stringify(habits));
        renderHabits(); closeSheet('viewSheet');
    }
}

// Eventos
document.getElementById('addHabitBtn').onclick = () => {
    currentHabitIdx = null;
    document.getElementById('hName').value = '';
    selectedIcon = '✨';
    document.getElementById('iconPickerTrigger').textContent = '✨';
    openSheet('createSheet');
};
document.getElementById('iconPickerTrigger').onclick = () => openSheet('iconPickerSheet');
document.getElementById('hTimeToggle').onchange = (e) => document.getElementById('hTime').style.display = e.target.checked ? 'block' : 'none';
dateInput.onchange = (e) => { selectedDate = e.target.value; renderHabits(); };

initIcons();
renderHabits();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>
</body>
</html>
